# 控制平面示例配置
listen:
  grpc: ":7443"
store:
  driver: sqlite
  dsn: "skipper.db"
metrics:
  http: ":9100"         # Prometheus 端点(/metrics)；留空则不启用
scheduler:
  interval: "2s"        # 调度循环周期
jobs:
  logs_dir: "job-logs"  # 作业日志存储目录
heartbeat:
  timeout: "30s"        # 超过该时长未心跳则判定节点 DOWN
  reap_interval: "10s"  # 失联巡检周期
log:
  level: "info"         # debug | info | warn | error
