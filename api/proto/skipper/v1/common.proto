syntax = "proto3";

package skipper.v1;

option go_package = "github.com/yqwu905/psychic-funicular/gen/skipper/v1;skipperv1";

// 一块可调度的加速设备（GPU/NPU）。M0 仅承载结构，实际采集在 M1。
message Device {
  string kind = 1;             // "gpu" | "npu"
  string vendor = 2;           // "nvidia" | "ascend" | ...
  uint32 index = 3;            // 设备序号
  string uuid = 4;
  uint64 mem_total_bytes = 5;
  string name = 6;             // 设备型号(如 "NVIDIA A100-SXM4-40GB")，用于 gpu_type 匹配
}

// 节点的资源清单。
message Resources {
  uint32 cpus = 1;
  uint64 mem_total_bytes = 2;
  repeated Device devices = 3;
}

// 节点视图（控制平面对外暴露）。
message Node {
  string id = 1;
  string name = 2;
  string partition = 3;
  string state = 4;            // "UP" | "DOWN" | "DRAIN"
  string addr = 5;
  Resources resources = 6;
  map<string, string> labels = 7;
  int64 last_heartbeat_unix = 8;
  string agent_version = 9;
}
