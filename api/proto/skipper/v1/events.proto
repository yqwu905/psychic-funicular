syntax = "proto3";

package skipper.v1;

option go_package = "github.com/yqwu905/psychic-funicular/gen/skipper/v1;skipperv1";

// Event 是对外的事件视图。
message Event {
  string id = 1;
  string type = 2;
  string severity = 3;
  string source = 4;
  string summary = 5;
  map<string, string> labels = 6;
  int64 time_unix = 7;
}

// Notification 是一条通知投递记录。
message Notification {
  string id = 1;
  string event_id = 2;
  string event_type = 3;
  string rule = 4;
  string channel = 5;
  string recipients = 6;
  string status = 7;
  string error = 8;
  string summary = 9;
  int64 time_unix = 10;
}
